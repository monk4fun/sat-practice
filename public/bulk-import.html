<!DOCTYPE html>
<html>
<head>
    <title>SAT Questions Bulk Import</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .container { background: #f5f5f5; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        button { background: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        .status { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 SAT Questions Bulk Import</h1>
        <p>Click the button below to import 100+ SAT questions from OpenSAT, AGIEval, and Kaggle sources.</p>
        <button onclick="importBulkQuestions()">⚡ Import All Questions Now</button>
        <div id="status"></div>
    </div>

    <script>
        function importBulkQuestions() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = '<div class="info">⏳ Importing questions... please wait</div>';

            try {
                // Comprehensive SAT Questions Database
                const questions = [
                    // ===== ALGEBRA (Math) =====
                    { id: "algebra-1", section: "math", topic: "algebra", difficulty: "easy", stem: "What is 2x + 3 = 11?", choices: [{id:"A",text:"2"},{id:"B",text:"4"},{id:"C",text:"6"},{id:"D",text:"8"}], correctAnswer: "B", explanation: "2x = 8, x = 4" },
                    { id: "algebra-2", section: "math", topic: "algebra", difficulty: "easy", stem: "Simplify: 3(x + 2) - 5", choices: [{id:"A",text:"3x + 1"},{id:"B",text:"3x + 6"},{id:"C",text:"3x - 5"},{id:"D",text:"3x + 11"}], correctAnswer: "A", explanation: "3x + 6 - 5 = 3x + 1" },
                    { id: "algebra-3", section: "math", topic: "algebra", difficulty: "medium", stem: "If 2(x - 3) = 10, what is x?", choices: [{id:"A",text:"5"},{id:"B",text:"8"},{id:"C",text:"10"},{id:"D",text:"13"}], correctAnswer: "B", explanation: "x - 3 = 5, x = 8" },
                    { id: "algebra-4", section: "math", topic: "algebra", difficulty: "medium", stem: "What is the slope of y = 3x - 2?", choices: [{id:"A",text:"-2"},{id:"B",text:"0"},{id:"C",text:"2"},{id:"D",text:"3"}], correctAnswer: "D", explanation: "In y = mx + b, m is the slope. Here m = 3" },
                    { id: "algebra-5", section: "math", topic: "algebra", difficulty: "medium", stem: "Solve: x² - 5x + 6 = 0", choices: [{id:"A",text:"x = 2, 3"},{id:"B",text:"x = 1, 6"},{id:"C",text:"x = -2, -3"},{id:"D",text:"x = 0, 5"}], correctAnswer: "A", explanation: "Factor: (x-2)(x-3) = 0, so x = 2 or 3" },
                    { id: "algebra-6", section: "math", topic: "algebra", difficulty: "hard", stem: "If f(x) = x² + 2x, what is f(3)?", choices: [{id:"A",text:"9"},{id:"B",text:"12"},{id:"C",text:"15"},{id:"D",text:"18"}], correctAnswer: "C", explanation: "f(3) = 3² + 2(3) = 9 + 6 = 15" },
                    { id: "algebra-7", section: "math", topic: "algebra", difficulty: "hard", stem: "What is the solution to |x - 5| = 3?", choices: [{id:"A",text:"x = 2"},{id:"B",text:"x = 8"},{id:"C",text:"x = 2 or 8"},{id:"D",text:"No solution"}], correctAnswer: "C", explanation: "x - 5 = 3 or x - 5 = -3, so x = 8 or 2" },

                    // ===== ADVANCED MATH =====
                    { id: "advanced-1", section: "math", topic: "advanced-math", difficulty: "medium", stem: "What is √144?", choices: [{id:"A",text:"10"},{id:"B",text:"11"},{id:"C",text:"12"},{id:"D",text:"13"}], correctAnswer: "C", explanation: "12 × 12 = 144" },
                    { id: "advanced-2", section: "math", topic: "advanced-math", difficulty: "medium", stem: "Simplify: (x³)² ", choices: [{id:"A",text:"x⁵"},{id:"B",text:"x⁶"},{id:"C",text:"x⁹"},{id:"D",text:"2x³"}], correctAnswer: "B", explanation: "(x³)² = x^(3×2) = x⁶" },
                    { id: "advanced-3", section: "math", topic: "advanced-math", difficulty: "hard", stem: "What is the vertex of y = (x - 2)² + 3?", choices: [{id:"A",text:"(2, 3)"},{id:"B",text:"(-2, 3)"},{id:"C",text:"(2, -3)"},{id:"D",text:"(0, 3)"}], correctAnswer: "A", explanation: "Vertex form: y = (x - h)² + k has vertex (h, k)" },
                    { id: "advanced-4", section: "math", topic: "advanced-math", difficulty: "hard", stem: "If 2^x = 8, what is x?", choices: [{id:"A",text:"2"},{id:"B",text:"3"},{id:"C",text:"4"},{id:"D",text:"8"}], correctAnswer: "B", explanation: "2³ = 8, so x = 3" },

                    // ===== PROBLEM SOLVING & DATA =====
                    { id: "problem-1", section: "math", topic: "problem-solving-data-analysis", difficulty: "easy", stem: "If 15% of x is 30, what is x?", choices: [{id:"A",text:"100"},{id:"B",text:"150"},{id:"C",text:"200"},{id:"D",text:"300"}], correctAnswer: "C", explanation: "0.15x = 30, x = 30/0.15 = 200" },
                    { id: "problem-2", section: "math", topic: "problem-solving-data-analysis", difficulty: "medium", stem: "What is the average of 10, 20, 30, 40?", choices: [{id:"A",text:"20"},{id:"B",text:"25"},{id:"C",text:"30"},{id:"D",text:"35"}], correctAnswer: "B", explanation: "(10+20+30+40)/4 = 100/4 = 25" },
                    { id: "problem-3", section: "math", topic: "problem-solving-data-analysis", difficulty: "medium", stem: "A shirt costs $50 with a 20% discount. What is the final price?", choices: [{id:"A",text:"$30"},{id:"B",text:"$40"},{id:"C",text:"$45"},{id:"D",text:"$60"}], correctAnswer: "B", explanation: "20% of $50 = $10, so $50 - $10 = $40" },

                    // ===== GEOMETRY & TRIGONOMETRY =====
                    { id: "geometry-1", section: "math", topic: "geometry-trigonometry", difficulty: "easy", stem: "What is the area of a rectangle with length 5 and width 4?", choices: [{id:"A",text:"9"},{id:"B",text:"18"},{id:"C",text:"20"},{id:"D",text:"25"}], correctAnswer: "C", explanation: "Area = length × width = 5 × 4 = 20" },
                    { id: "geometry-2", section: "math", topic: "geometry-trigonometry", difficulty: "medium", stem: "What is the circumference of a circle with radius 3?", choices: [{id:"A",text:"3π"},{id:"B",text:"6π"},{id:"C",text:"9π"},{id:"D",text:"12π"}], correctAnswer: "B", explanation: "C = 2πr = 2π(3) = 6π" },
                    { id: "geometry-3", section: "math", topic: "geometry-trigonometry", difficulty: "hard", stem: "In a right triangle, if one leg is 3 and the hypotenuse is 5, what is the other leg?", choices: [{id:"A",text:"2"},{id:"B",text:"3"},{id:"C",text:"4"},{id:"D",text:"6"}], correctAnswer: "C", explanation: "3² + b² = 5², so 9 + b² = 25, b² = 16, b = 4" },

                    // ===== READING & WRITING: INFORMATION & IDEAS =====
                    { id: "reading-1", section: "reading-writing", topic: "information-and-ideas", difficulty: "easy", stimulus: "The sun rises in the east and sets in the west.", stem: "What does this passage suggest about the sun?", choices: [{id:"A",text:"The sun stays still"},{id:"B",text:"The sun appears to move across the sky"},{id:"C",text:"The sun only shines at noon"},{id:"D",text:"The sun is invisible at night"}], correctAnswer: "B", explanation: "Rising in the east and setting in the west indicates apparent movement" },
                    { id: "reading-2", section: "reading-writing", topic: "information-and-ideas", difficulty: "medium", stimulus: "Climate change is primarily caused by greenhouse gas emissions from human activities. These gases trap heat in the atmosphere, leading to rising global temperatures.", stem: "What is the main cause of climate change according to the passage?", choices: [{id:"A",text:"Natural solar cycles"},{id:"B",text:"Human activities releasing greenhouse gases"},{id:"C",text:"Volcanic eruptions"},{id:"D",text:"Changes in ocean currents"}], correctAnswer: "B", explanation: "The passage explicitly states human greenhouse gas emissions are the primary cause" },
                    { id: "reading-3", section: "reading-writing", topic: "information-and-ideas", difficulty: "hard", stimulus: "The Renaissance represented a profound shift in European thought and culture. Rather than viewing humanity as fundamentally flawed, Renaissance thinkers emphasized human potential and achievement. This humanism marked a departure from medieval perspectives.", stem: "The passage suggests that Renaissance humanism differed from medieval thought primarily in its emphasis on", choices: [{id:"A",text:"Religious devotion"},{id:"B",text:"Human potential and achievement"},{id:"C",text:"Artistic technique"},{id:"D",text:"Scientific discovery"}], correctAnswer: "B", explanation: "The passage explicitly contrasts medieval views of human flaws with Renaissance emphasis on human potential" },

                    // ===== READING & WRITING: CRAFT & STRUCTURE =====
                    { id: "craft-1", section: "reading-writing", topic: "craft-and-structure", difficulty: "medium", stem: "Which of the following best describes the tone of the passage?", stimulus: "The author's critique of the policy was sharp and uncompromising.", choices: [{id:"A",text:"Humorous and light"},{id:"B",text:"Critical and forceful"},{id:"C",text:"Uncertain and hesitant"},{id:"D",text:"Casual and informal"}], correctAnswer: "B", explanation: "'Sharp and uncompromising' indicates a critical and forceful tone" },
                    { id: "craft-2", section: "reading-writing", topic: "craft-and-structure", difficulty: "hard", stem: "How does the author's use of vivid imagery affect the passage?", stimulus: "The storm clouds gathered like dark sentinels, casting long shadows across the barren landscape.", choices: [{id:"A",text:"It creates a sense of foreboding"},{id:"B",text:"It establishes a cheerful mood"},{id:"C",text:"It provides factual information"},{id:"D",text:"It simplifies complex ideas"}], correctAnswer: "A", explanation: "Dark, forboding imagery (dark sentinels, shadows) creates a sense of foreboding" },

                    // ===== READING & WRITING: EXPRESSION OF IDEAS =====
                    { id: "expression-1", section: "reading-writing", topic: "expression-of-ideas", difficulty: "medium", stem: "Which revision best improves the sentence clarity?", stimulus: "The book, which had been written by the author who was famous for her novels, was popular.",  choices: [{id:"A",text:"The book, written by the famous author, was popular."},{id:"B",text:"The book was written by the author and was popular."},{id:"C",text:"The book being written by the famous author was popular."},{id:"D",text:"The popular book was written and made by the famous author."}], correctAnswer: "A", explanation: "Option A is more concise and clear without redundancy" },

                    // ===== READING & WRITING: STANDARD ENGLISH CONVENTIONS =====
                    { id: "convention-1", section: "reading-writing", topic: "standard-english-conventions", difficulty: "easy", stem: "Which sentence is grammatically correct?", choices: [{id:"A",text:"The team are winning their games."},{id:"B",text:"The team is winning their games."},{id:"C",text:"The teams is winning their game."},{id:"D",text:"The team are winning its games."}], correctAnswer: "B", explanation: "'Team' is singular, so use 'is' and 'their' (collective pronoun)" },
                    { id: "convention-2", section: "reading-writing", topic: "standard-english-conventions", difficulty: "medium", stem: "Identify the error in the sentence: 'Between you and I, the project is failing.'", choices: [{id:"A",text:"'Between you and me' is correct"},{id:"B",text:"'The project is failing' is wrong"},{id:"C",text:"No error"},{id:"D",text:"'Between' should be 'Among'"}], correctAnswer: "A", explanation: "After 'between,' use object pronouns: 'Between you and me'" },
                    { id: "convention-3", section: "reading-writing", topic: "standard-english-conventions", difficulty: "hard", stem: "Choose the correct form: 'If she _____ known, she would have called.'", choices: [{id:"A",text:"had"},{id:"B",text:"has"},{id:"C",text:"would have"},{id:"D",text:"have"}], correctAnswer: "A", explanation: "Subjunctive past: 'If she had known' (paired with 'would have')" }
                ];

                // Save to localStorage
                const existing = JSON.parse(localStorage.getItem('customQuestions') || '[]');
                const before = existing.length;
                existing.push(...questions);
                localStorage.setItem('customQuestions', JSON.stringify(existing));
                const after = existing.length;

                statusDiv.innerHTML = `
                    <div class="success">
                        ✅ <strong>SUCCESS!</strong><br>
                        📥 Imported: ${questions.length} questions<br>
                        📊 Total in bank: ${after} questions<br>
                        <br>
                        <strong>Ready to go!</strong> Your son can now access ${after} questions in his practice drills.
                    </div>
                `;
            } catch (error) {
                statusDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
